name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    if: |
      startsWith(github.event.head_commit.message, 'release:') ||
      startsWith(github.event.head_commit.message, 'release :') ||
      startsWith(github.event.head_commit.message, 'major-release:') ||
      startsWith(github.event.head_commit.message, 'major-release :') ||
      startsWith(github.event.head_commit.message, 'minor-release:') ||
      startsWith(github.event.head_commit.message, 'minor-release :')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install argc
        uses: sigoden/install-binary@v1
        with:
          repo: sigoden/argc

      - name: Check argc
        run: argc --argc-version

      - name: Build export-searchkit
        run: |
          chmod +x build.sh src/export-searchkit.sh
          ./build.sh
          test -x export-searchkit

      - name: Determine next version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          msg="${{ github.event.head_commit.message }}"

          echo "Commit message: $msg"
          echo "Existing GitHub releases:"
          gh release list --limit 20 || true

          latest_tag="$(
            gh release list \
              --limit 100 \
              --json tagName,isDraft,isPrerelease \
              --jq '[.[] | select(.isDraft == false and .isPrerelease == false) | .tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0]' \
              || true
          )"

          echo "Latest release tag detected: ${latest_tag:-none}"

          if [[ -z "$latest_tag" || "$latest_tag" == "null" ]]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"

            if [[ "$msg" == release:* || "$msg" == release\ :* ]]; then
              major=$((major + 1))
              minor=0
              patch=0
            elif [[ "$msg" == major-release:* || "$msg" == major-release\ :* ]]; then
              minor=$((minor + 1))
              patch=0
            elif [[ "$msg" == minor-release:* || "$msg" == minor-release\ :* ]]; then
              patch=$((patch + 1))
            else
              echo "No release trigger found."
              exit 1
            fi

            next_tag="v${major}.${minor}.${patch}"
          fi

          echo "Next release: $next_tag"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: ${{ steps.version.outputs.next_tag }}
          body: |
            Automated release from commit:

            ${{ github.event.head_commit.message }}
          files: |
            export-searchkit